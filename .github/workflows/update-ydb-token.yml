name: Update YDB IAM Token (Fallback)

on:
  schedule:
    # Каждые 11 часов — IAM-токен живёт 12 часов, обновляемся за 1 час до истечения
    - cron: '0 */11 * * *'
  # Возможность запустить вручную
  workflow_dispatch:

env:
  _HAVE_SECRETS: ${{ secrets.YC_SA_KEY_JSON != '' && secrets.YC_CLOUD_ID != '' && secrets.YC_FOLDER_ID != '' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_PROJECT_ID != '' }}

jobs:
  update-token:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        if: env._HAVE_SECRETS != 'true'
        run: |
          echo "::warning::Отсутствуют обязательные секреты GitHub."
          echo "::warning::Этот воркфлоу — fallback. Основная аутентификация идёт через YDB_SA_KEY_JSON."
          exit 0  # Не блокируем, т.к. это fallback

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI and get IAM token
        env:
          YC_SERVICE_ACCOUNT_KEY_FILE: /tmp/sa-key.json
        run: |
          # Устанавливаем YC CLI
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          
          # Добавляем yc в PATH
          export PATH="$HOME/yandex-cloud/bin:$PATH"
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          
          # Создаём файл ключа
          echo '${{ secrets.YC_SA_KEY_JSON }}' > /tmp/sa-key.json
          
          # Аутентифицируемся
          yc config set service-account-key /tmp/sa-key.json
          yc config set cloud-id '${{ secrets.YC_CLOUD_ID }}'
          yc config set folder-id '${{ secrets.YC_FOLDER_ID }}'
          
          # Получаем IAM-токен
          TOKEN=$(yc iam create-token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        id: get-token

      - name: Update Vercel Environment Variable (Fallback)
        uses: actions/github-script@v7
        env:
          YDB_TOKEN: ${{ steps.get-token.outputs.token }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        with:
          script: |
            const token = process.env.YDB_TOKEN;
            const vercelToken = process.env.VERCEL_TOKEN;
            const projectId = process.env.VERCEL_PROJECT_ID;
            
            console.log('Updating YDB_ACCESS_TOKEN_CREDENTIALS as fallback...');
            console.log('(Primary auth uses YDB_SA_KEY_JSON - permanent key)');
            
            // Получаем список всех переменных окружения
            const listResponse = await fetch(
              `https://api.vercel.com/v10/projects/${projectId}/env`,
              {
                headers: {
                  'Authorization': `Bearer ${vercelToken}`,
                },
              }
            );
            
            if (!listResponse.ok) {
              const text = await listResponse.text();
              throw new Error(`Vercel API list error: ${listResponse.status} ${text}`);
            }
            
            const listData = await listResponse.json();
            const existingEnv = listData.envs && listData.envs.find(
              env => env.key === 'YDB_ACCESS_TOKEN_CREDENTIALS'
            );
            
            let response;
            if (existingEnv) {
              console.log('Updating existing env var, id:', existingEnv.id);
              response = await fetch(
                `https://api.vercel.com/v10/projects/${projectId}/env/${existingEnv.id}`,
                {
                  method: 'PATCH',
                  headers: {
                    'Authorization': `Bearer ${vercelToken}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    value: token,
                  }),
                }
              );
            } else {
              console.log('Creating new env var');
              response = await fetch(
                `https://api.vercel.com/v10/projects/${projectId}/env`,
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${vercelToken}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    key: 'YDB_ACCESS_TOKEN_CREDENTIALS',
                    value: token,
                    type: 'encrypted',
                    target: ['production', 'preview'],
                  }),
                }
              );
            }
            
            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Vercel API error: ${response.status} ${text}`);
            }
            
            console.log('Fallback token updated successfully');

      - name: Redeploy Vercel (only if needed)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Fallback token updated. No redeploy needed - primary auth uses YDB_SA_KEY_JSON."
          echo "Redeploy only required if YDB_SA_KEY_JSON is missing."