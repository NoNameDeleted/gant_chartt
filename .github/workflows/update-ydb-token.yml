name: Update YDB IAM Token

on:
  schedule:
    # Каждые 11 часов — IAM-токен живёт 12 часов, обновляемся за 1 час до истечения
    - cron: '0 */11 * * *'
  # Возможность запустить вручную
  workflow_dispatch:

env:
  # Проверяем наличие обязательных секретов на старте
  _HAVE_SECRETS: ${{ secrets.YC_SA_KEY_JSON != '' && secrets.YC_CLOUD_ID != '' && secrets.YC_FOLDER_ID != '' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_PROJECT_ID != '' }}

jobs:
  update-token:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        if: env._HAVE_SECRETS != 'true'
        run: |
          echo "::error::Отсутствуют обязательные секреты GitHub. Проверьте:"
          echo "::error::  - YC_SA_KEY_JSON (авторизованный ключ сервисного аккаунта)"
          echo "::error::  - YC_CLOUD_ID (ID облака)"
          echo "::error::  - YC_FOLDER_ID (ID каталога)"
          echo "::error::  - VERCEL_TOKEN (токен Vercel)"
          echo "::error::  - VERCEL_PROJECT_ID (ID проекта Vercel)"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/.yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        env:
          YC_SERVICE_ACCOUNT_KEY_FILE: /tmp/sa-key.json
        run: |
          # Создаём файл ключа из переменной окружения GitHub Secrets
          echo '${{ secrets.YC_SA_KEY_JSON }}' > /tmp/sa-key.json
          # yc уже должен быть в PATH после предыдущего шага (через GITHUB_PATH)
          yc config set service-account-key /tmp/sa-key.json
          yc config set cloud-id '${{ secrets.YC_CLOUD_ID }}'
          yc config set folder-id '${{ secrets.YC_FOLDER_ID }}'

      - name: Get IAM Token
        id: get-token
        run: |
          TOKEN=$(yc iam create-token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Update Vercel Environment Variable
        uses: actions/github-script@v7
        env:
          YDB_TOKEN: ${{ steps.get-token.outputs.token }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        with:
          script: |
            const token = process.env.YDB_TOKEN;
            const vercelToken = process.env.VERCEL_TOKEN;
            const projectId = process.env.VERCEL_PROJECT_ID;
            
            // Сначала проверяем, существует ли уже переменная
            const listResponse = await fetch(
              `https://api.vercel.com/v10/projects/${projectId}/env?key=YDB_ACCESS_TOKEN_CREDENTIALS`,
              {
                headers: {
                  'Authorization': `Bearer ${vercelToken}`,
                },
              }
            );
            
            if (!listResponse.ok) {
              const text = await listResponse.text();
              throw new Error(`Vercel API list error: ${listResponse.status} ${text}`);
            }
            
            const listData = await listResponse.json();
            const existingEnv = listData.envs && listData.envs[0];
            
            let response;
            if (existingEnv) {
              // Переменная существует — обновляем через PATCH
              console.log('Updating existing env var, id:', existingEnv.id);
              response = await fetch(
                `https://api.vercel.com/v10/projects/${projectId}/env/${existingEnv.id}`,
                {
                  method: 'PATCH',
                  headers: {
                    'Authorization': `Bearer ${vercelToken}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    value: token,
                  }),
                }
              );
            } else {
              // Переменной нет — создаём через POST
              console.log('Creating new env var');
              response = await fetch(
                `https://api.vercel.com/v10/projects/${projectId}/env`,
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${vercelToken}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    key: 'YDB_ACCESS_TOKEN_CREDENTIALS',
                    value: token,
                    type: 'encrypted',
                    target: ['production', 'preview'],
                  }),
                }
              );
            }
            
            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Vercel API error: ${response.status} ${text}`);
            }
            
            console.log('Token updated successfully');

      - name: Redeploy Vercel
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v1/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}" \
            -d '{"target": "production"}'